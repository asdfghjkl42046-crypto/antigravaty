<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity - AI 科技法庭預覽</title>
  <style>
    /* 簡約沉穩的科技藍風格 (延續 React 版本) */
    :root {
      --bg-color: #0b1120;
      --panel-bg: #0d1117;
      --neon-blue: #3b82f6;
      --neon-blue-light: #60a5fa;
      --neon-blue-dim: rgba(59, 130, 246, 0.2);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* 主遊戲法庭容器 */
    #game-container {
      width: 90%;
      max-width: 600px;
      background: var(--panel-bg);
      border: 1px solid var(--neon-blue-dim);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.1);
      position: relative;
    }

    h1.court-title {
      color: var(--text-main);
      font-size: 1.5rem;
      font-weight: 900;
      margin-top: 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 10px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* 開庭標題左側的小圖示修飾 */
    h1.court-title::before {
      content: "";
      display: inline-block;
      width: 12px;
      height: 12px;
      background: var(--neon-blue);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--neon-blue);
    }

    /* 起訴故事區 */
    #story-display {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px;
      border-left: 4px solid var(--neon-blue);
      border-radius: 0 12px 12px 0;
      margin-bottom: 24px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-muted);
    }

    /* 計時器與身分提示 */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      background: rgba(59, 130, 246, 0.05);
      padding: 10px 20px;
      border-radius: 12px;
      border: 1px solid var(--neon-blue-dim);
    }

    .speaker-label {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    #current-speaker-display {
      font-weight: 900;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 12px;
      border-radius: 8px;
      margin-left: 8px;
    }

    #timer-display {
      font-size: 2rem;
      font-weight: 900;
      font-family: monospace;
      color: var(--neon-blue-light);
      text-shadow: 0 0 15px rgba(96, 165, 250, 0.4);
    }

    /* 輸入區 */
    #court-text-input {
      width: 100%;
      height: 120px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: var(--text-main);
      padding: 16px;
      font-family: inherit;
      font-size: 1rem;
      resize: none;
      box-sizing: border-box;
      outline: none;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    #court-text-input:focus {
      border-color: var(--neon-blue);
      box-shadow: 0 0 15px var(--neon-blue-dim);
      background: rgba(0, 0, 0, 0.6);
    }

    #court-text-input::placeholder {
      color: #475569;
    }

    /* 按鈕通用樣式 */
    button {
      background: var(--neon-blue);
      border: none;
      border-radius: 12px;
      color: white;
      padding: 16px 24px;
      font-size: 1.1rem;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      width: 100%;
      box-shadow: 0 4px 20px var(--neon-blue-dim);
    }

    button:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }
    
    button:active {
      transform: translateY(1px);
    }

    /* ========================================= */
    /* 全螢幕交接遮罩 */
    /* ========================================= */
    #transition-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      /* 舊版本瀏覽器的 Fallback：使用幾乎不透明的背景確保文字可視性 */
      background: rgba(11, 17, 32, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      border-radius: 20px;
    }

    /* 檢查是否支援 backdrop-filter（包含 Safari 的 webkit 前綴），若支援則套用毛玻璃效果並調低透明度 */
    @supports (backdrop-filter: blur(10px)) or (-webkit-backdrop-filter: blur(10px)) {
      #transition-overlay {
        background: rgba(11, 17, 32, 0.6);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }
    }

    .overlay-content {
      text-align: center;
      padding: 40px;
      border-radius: 24px;
      background: rgba(59, 130, 246, 0.05);
      border: 1px solid var(--neon-blue-dim);
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.1);
      width: 80%;
    }

    #transition-overlay h2 {
      color: var(--neon-blue-light);
      margin-top: 0;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #next-speaker-name {
      color: var(--text-main);
      font-size: 2.5rem;
      font-weight: 900;
      margin: 20px 0 40px 0;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <h1 class="court-title">AI Judicial Protocol</h1>
    
    <div id="story-display">正在載入起訴案情...</div>

    <div class="status-bar">
      <div class="speaker-label">當前授權發言 <span id="current-speaker-display"></span></div>
      <div id="timer-display">00</div>
    </div>

    <textarea id="court-text-input" placeholder="請輸入您的干預意見或辯詞 (留白將視為保持沈默)..."></textarea>
    
    <button id="submit-btn" onclick="handleTimeUp()">確認送出 [Enter]</button>
    
    <div id="transition-overlay">
      <div class="overlay-content">
        <h2>System Lock: 裝置交接中</h2>
        <h3 id="next-speaker-name">載入中...</h3>
        <button id="ready-btn" onclick="onPlayerReadyClick()">我準備好了，解鎖發言</button>
      </div>
    </div>
  </div>

  <script>
    let currentProsecutionStory = "【案號 XA-994】\n「根據檢調單位的 Action Log 顯示，被告涉及高風險操作...」\n請被告進行最終答辯，隨後由旁觀者自由補充言論。";
    
    const courtData = {
      defense: "", bystander1: "", bystander2: "", bystander3: ""
    };

    const speakerQueue = [
      { key: "defense", name: "被告", time: 45 },
      { key: "bystander1", name: "旁觀者 1", time: 15 },
      { key: "bystander2", name: "旁觀者 2", time: 15 },
      { key: "bystander3", name: "旁觀者 3", time: 15 }
    ];

    let currentQueueIndex = 0; 
    let timerInterval = null;
    let isWaitingForNextPlayer = true;

    const overlay = document.getElementById("transition-overlay");
    const nextSpeakerText = document.getElementById("next-speaker-name");
    const storyDisplay = document.getElementById("story-display");
    const currentSpeakerDisplay = document.getElementById("current-speaker-display");
    const timerDisplay = document.getElementById("timer-display");
    const textInput = document.getElementById("court-text-input");
    const submitBtn = document.getElementById("submit-btn");

    storyDisplay.innerText = currentProsecutionStory;

    function prepareNextSpeaker() {
      if (currentQueueIndex >= speakerQueue.length) {
        checkTrialCompletion();
        return;
      }

      const currentSpeaker = speakerQueue[currentQueueIndex];
      isWaitingForNextPlayer = true; 

      nextSpeakerText.innerText = `>>> ${currentSpeaker.name} <<<`;
      overlay.classList.remove("hidden");
      
      currentSpeakerDisplay.innerText = currentSpeaker.name;
      timerDisplay.innerText = currentSpeaker.time + "S";
      textInput.value = "";
    }

    function onPlayerReadyClick() {
      if (!isWaitingForNextPlayer) return; 

      const currentSpeaker = speakerQueue[currentQueueIndex];
      isWaitingForNextPlayer = false; 

      overlay.classList.add("hidden");
      textInput.focus();

      startTimer(currentSpeaker.time);
    }

    function startTimer(seconds) {
      let timeLeft = seconds;
      timerDisplay.innerText = timeLeft + "s";

      if (timerInterval) clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        timeLeft--;
        timerDisplay.innerText = timeLeft + "s";

        // 當低於 5 秒時產生閃爍警告感，改為橘紅警戒
        if (timeLeft <= 5) {
          timerDisplay.style.color = (timeLeft % 2 === 0) ? "#ef4444" : "#f8fafc";
          timerDisplay.style.textShadow = (timeLeft % 2 === 0) ? "0 0 15px rgba(239, 68, 68, 0.6)" : "none";
        } else {
          timerDisplay.style.color = "var(--neon-blue-light)";
          timerDisplay.style.textShadow = "0 0 15px rgba(96, 165, 250, 0.4)";
        }

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          handleTimeUp();
        }
      }, 1000);
    }

    function handleTimeUp() {
      const currentSpeaker = speakerQueue[currentQueueIndex];
      let textValue = textInput.value.trim();

      if (textValue === "") {
        textValue = "[玩家保持沈默]";
      }

      courtData[currentSpeaker.key] = textValue;
      
      timerDisplay.style.color = "var(--neon-blue-light)";
      timerDisplay.style.textShadow = "0 0 15px rgba(96, 165, 250, 0.4)";
      currentQueueIndex++; 
      prepareNextSpeaker(); 
    }

    function checkTrialCompletion() {
      textInput.classList.add("hidden");
      submitBtn.classList.add("hidden");
      overlay.classList.remove("hidden");
      
      document.querySelector(".overlay-content h2").innerText = "[ 系統結算 ]";
      nextSpeakerText.innerText = "資料封裝中，準備移交 AI 判決...";
      document.getElementById("ready-btn").classList.add("hidden");

      const finalPayload = {
        backgroundStory: currentProsecutionStory,
        trialData: courtData
      };

      console.log("【發送給 AI 的最終封包】：\n", JSON.stringify(finalPayload, null, 2));
      setTimeout(() => {
        alert("資料已收集完畢！請按 F12 打開 Console 查看送出的 JSON 封包結構。");
      }, 500);
    }

    prepareNextSpeaker();

    textInput.addEventListener("keydown", function(event) {
      if (!isWaitingForNextPlayer && event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        handleTimeUp();
      }
    });

  </script>
</body>
</html>
